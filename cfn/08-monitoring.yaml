AWSTemplateFormatVersion: '2010-09-09'
Description: NIDS v3 Monitoring — CloudWatch Alarms, SNS Topic, Dashboard.

Parameters:
  AlertEmail:
    Type: String
    Description: Email address for alarm notifications

Resources:
  # ============================================================
  # SNS TOPIC FOR ALERTS
  # ============================================================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: nids-alerts
      Tags:
        - Key: Project
          Value: NIDS

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ============================================================
  # CLOUDWATCH ALARMS
  # ============================================================
  HighAttackRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: NIDS-HighAttackRate
      AlarmDescription: Fires when attack predictions exceed 50 per minute for 2 consecutive periods.
      Namespace: NIDS/Predictions
      MetricName: AttackCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: NIDS-HighPredictionLatency
      AlarmDescription: Fires when average prediction latency exceeds 500ms for 3 consecutive periods.
      Namespace: NIDS/Predictions
      MetricName: PredictionLatencyMs
      Statistic: Average
      Period: 60
      EvaluationPeriods: 3
      Threshold: 500
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  LowConfidenceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: NIDS-LowConfidence
      AlarmDescription: Fires when average prediction confidence drops below 0.6 for 5 consecutive periods.
      Namespace: NIDS/Predictions
      MetricName: PredictionConfidence
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: 0.6
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  IDSEngineUnhealthyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: NIDS-IDSEngineUnhealthy
      AlarmDescription: IDS Engine task count dropped to 0.
      Namespace: AWS/ECS
      MetricName: RunningTaskCount
      Dimensions:
        - Name: ClusterName
          Value: NIDS-Cluster
        - Name: ServiceName
          Value: !ImportValue NIDS-IDSEngineService
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: breaching

  # ============================================================
  # CLOUDWATCH DASHBOARD
  # ============================================================
  NIDSDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NIDS-Monitoring
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Predictions / min",
                "region": "${AWS::Region}",
                "metrics": [
                  ["NIDS/Predictions", "TotalPredictions", {"stat": "Sum", "period": 60}],
                  ["NIDS/Predictions", "AttackCount",      {"stat": "Sum", "period": 60}],
                  ["NIDS/Predictions", "BenignCount",      {"stat": "Sum", "period": 60}]
                ],
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Prediction Latency (ms)",
                "region": "${AWS::Region}",
                "metrics": [
                  ["NIDS/Predictions", "PredictionLatencyMs", {"stat": "Average", "period": 60}],
                  ["NIDS/Predictions", "PredictionLatencyMs", {"stat": "p99",     "period": 60}]
                ],
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Confidence Score",
                "region": "${AWS::Region}",
                "metrics": [
                  ["NIDS/Predictions", "PredictionConfidence", {"stat": "Average", "period": 60}],
                  ["NIDS/Predictions", "PredictionConfidence", {"stat": "Minimum", "period": 60}]
                ],
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "ECS Running Tasks",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/ECS", "RunningTaskCount", "ClusterName", "NIDS-Cluster"]
                ],
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  AlertTopicArn:
    Value: !Ref AlertTopic
    Export:
      Name: NIDS-AlertTopic-Arn
