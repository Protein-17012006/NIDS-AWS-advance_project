AWSTemplateFormatVersion: '2010-09-09'
Description: >
  NIDS v3 ECS Fargate — IDS Engine + Dashboard behind ALB,
  with Cloud Map service discovery for inter-service communication.

Parameters:
  IDSEngineImage:
    Type: String
    Description: ECR URI for IDS engine image (e.g. 123456789.dkr.ecr.region.amazonaws.com/nids-ids-engine:latest)
  DashboardImage:
    Type: String
    Description: ECR URI for dashboard image

Resources:
  # ============================================================
  # ECS CLUSTER
  # ============================================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: NIDS-Cluster
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: NIDS

  # ============================================================
  # CLOUD MAP — Service Discovery (engine.nids.local)
  # ============================================================
  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: nids.local
      Vpc: !ImportValue NIDS-VPC-Id

  EngineServiceDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: engine
      NamespaceId: !Ref ServiceDiscoveryNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ============================================================
  # LOG GROUPS
  # ============================================================
  IDSEngineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/nids-ids-engine
      RetentionInDays: 7

  DashboardLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/nids-dashboard
      RetentionInDays: 7

  # ============================================================
  # ALB (internet-facing, public subnets)
  # ============================================================
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: NIDS-ALB
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue NIDS-PublicSubnet-Id
        - !ImportValue NIDS-PublicSubnet2-Id
      SecurityGroups:
        - !ImportValue NIDS-SG-ALB
      Tags:
        - Key: Project
          Value: NIDS

  DashboardTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: NIDS-Dashboard-TG
      Port: 3000
      Protocol: HTTP
      VpcId: !ImportValue NIDS-VPC-Id
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref DashboardTargetGroup

  # ============================================================
  # TASK DEFINITION: IDS ENGINE (Fargate, 1 vCPU, 2 GB)
  # ============================================================
  IDSEngineTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: nids-ids-engine
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '1024'
      Memory: '2048'
      ExecutionRoleArn: !ImportValue NIDS-ECSTaskExecutionRole-Arn
      TaskRoleArn: !ImportValue NIDS-IDSEngineTaskRole-Arn
      ContainerDefinitions:
        - Name: ids-engine
          Image: !Ref IDSEngineImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: IDS_S3_BUCKET
              Value: !ImportValue NIDS-DataBucket
            - Name: IDS_S3_MODEL_PREFIX
              Value: models/
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: WEB_SERVER_IP
              Value: !ImportValue NIDS-WebServer-IP
            - Name: ATTACKER_INSTANCE_ID
              Value: !ImportValue NIDS-Attacker-Id
            - Name: ATTACKER_IP
              Value: !ImportValue NIDS-Attacker-IP
            - Name: VICTIM_NACL_ID
              Value: !ImportValue NIDS-PrivateNACL-Id
            - Name: AUTO_RESPONSE_ENABLED
              Value: 'true'
            - Name: ALLOWLIST_IPS
              Value: '10.0.1.0/24,10.0.5.0/24'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref IDSEngineLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: engine
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3

  # ============================================================
  # TASK DEFINITION: DASHBOARD (Fargate, 0.25 vCPU, 0.5 GB)
  # ============================================================
  DashboardTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: nids-dashboard
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !ImportValue NIDS-ECSTaskExecutionRole-Arn
      ContainerDefinitions:
        - Name: dashboard
          Image: !Ref DashboardImage
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DashboardLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: dashboard

  # ============================================================
  # ECS SERVICES
  # ============================================================
  IDSEngineService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref ECSCluster
      ServiceName: nids-ids-engine
      TaskDefinition: !Ref IDSEngineTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !ImportValue NIDS-IDSSubnet-Id
          SecurityGroups:
            - !ImportValue NIDS-SG-IDSEngine
      ServiceRegistries:
        - RegistryArn: !GetAtt EngineServiceDiscovery.Arn
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

  DashboardService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      Cluster: !Ref ECSCluster
      ServiceName: nids-dashboard
      TaskDefinition: !Ref DashboardTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !ImportValue NIDS-IDSSubnet-Id
          SecurityGroups:
            - !ImportValue NIDS-SG-Dashboard
      LoadBalancers:
        - TargetGroupArn: !Ref DashboardTargetGroup
          ContainerName: dashboard
          ContainerPort: 3000
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

Outputs:
  ECSClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: NIDS-ECSCluster
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: NIDS-ALB-DNS
  EngineServiceDiscoveryDns:
    Value: engine.nids.local
    Export:
      Name: NIDS-Engine-DNS
  IDSEngineServiceName:
    Value: !GetAtt IDSEngineService.Name
    Export:
      Name: NIDS-IDSEngineService
