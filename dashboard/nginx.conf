resolver 10.0.0.2 valid=10s ipv6=off;

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # index.html must never be cached (filename doesn't change)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed static assets can be cached forever
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA — fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to IDS Engine (via Cloud Map service discovery)
    location /api/ {
        set $engine engine.nids.local;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$engine:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket proxy
    location /ws/ {
        set $engine engine.nids.local;
        rewrite ^/ws/(.*) /ws/$1 break;
        proxy_pass http://$engine:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
